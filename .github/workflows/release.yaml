name: Release

on:
  push:
    tags:
      - "v*" # triggers on v0.1.0, v1.2.3, v1.0.0-rc.1, etc.

permissions:
  contents: write # required to create the GitHub release and upload assets

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # uses whatever version is in your go.mod
          cache: true

      # gcc cross-compiler for arm64 cgo build (sdjournal requires cgo).
      - name: Install cross-compilers
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
