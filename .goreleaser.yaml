version: 2

project_name: tailkitd

before:
  hooks:
    - go mod tidy

builds:
  # Full build — includes cgo for sdjournal (systemd journal integration).
  # Requires gcc cross-compilers on the runner (installed in the workflow).
  - id: tailkitd-full
    binary: tailkitd
    main: ./cmd/tailkitd
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Arch "amd64"}}CC=gcc{{- end}}
        {{- if eq .Arch "arm64"}}CC=aarch64-linux-gnu-gcc{{- end}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  # Nosystemd build — pure static binary, no cgo, no sdjournal.
  # For nodes where the systemd integration is not needed.
  # Drops onto any Linux node with zero dependencies.
  - id: tailkitd-nosystemd
    binary: tailkitd-nosystemd
    main: ./cmd/tailkitd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    tags:
      - nosystemd
    ldflags:
      - -s -w
      - -extldflags "-static"
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: full
    builds:
      - tailkitd-full
    # Flat archive — just the binary, no directory wrapper.
    # Makes the install one-liner simpler: extract and run.
    format: tar.gz
    name_template: "tailkitd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none* # binary only

  - id: nosystemd
    builds:
      - tailkitd-nosystemd
    format: tar.gz
    name_template: "tailkitd_{{ .Version }}_{{ .Os }}_{{ .Arch }}_nosystemd"
    files:
      - none*

checksum:
  name_template: "tailkitd_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: wf-pro-dev
    name: tailkitd
  draft: false
  prerelease: auto # tags like v1.0.0-rc.1 are marked as pre-release automatically
  name_template: "tailkitd {{.Version}}"
